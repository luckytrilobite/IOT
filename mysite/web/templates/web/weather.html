<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>斗六氣象 Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    margin: 10px auto;
}

h1 { color: #38bdf8; }

.big {
    font-size: 40px;
    margin: 10px 0;
}

.row {
    display: flex;
    justify-content: space-around;
}
</style>
</head>

<body>

<h1>🌦 斗六即時氣象</h1>

<div class="card">
    <div id="temp" class="big">--</div>
    <div id="humidity">濕度：--</div>
    <div id="uv">UV：--</div>
</div>

<h2>📊 未來 3 小時預報</h2>
<div id="forecast"></div>

<a href="/">回首頁</a>

<script>
async function loadWeather() {

    const url =
    "https://api.open-meteo.com/v1/forecast" +
    "?latitude=23.7075&longitude=120.5405" +
    "&current=temperature_2m,relative_humidity_2m,uv_index" +
    "&hourly=temperature_2m,relative_humidity_2m" +
    "&forecast_hours=3";

    const res = await fetch(url);
    const data = await res.json();

    // ===== 即時資料 =====
    const cur = data.current;

    document.getElementById("temp").innerText =
        cur.temperature_2m + " °C";

    document.getElementById("humidity").innerText =
        "濕度：" + cur.relative_humidity_2m + " %";

    document.getElementById("uv").innerText =
        "UV：" + cur.uv_index;

    // ===== 3 小時預報 =====
    const hours = data.hourly.time.slice(0, 3);
    const temps = data.hourly.temperature_2m.slice(0, 3);
    const hums = data.hourly.relative_humidity_2m.slice(0, 3);

    let html = "";

    for (let i = 0; i < 3; i++) {
        html += `
        <div class="card">
            🕒 ${hours[i]}<br>
            🌡 ${temps[i]} °C<br>
            💧 ${hums[i]} %
        </div>`;
    }

    document.getElementById("forecast").innerHTML = html;
}

loadWeather();
</script>

</body>
</html>

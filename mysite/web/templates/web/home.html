<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>IoT Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    color: #00ff88;
    font-family: "Courier New", monospace;
}

.container {
    display: flex;
    height: 100vh;
}

/* 左邊 2/3 */
.left {
    width: 66%;
    padding: 20px;
    box-sizing: border-box;
    border-right: 1px solid #00ff88;
}

/* 右邊 1/3 */
.right {
    width: 34%;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* 卡片 */
.card {
    border: 1px solid #00ff88;
    padding: 15px;
    border-radius: 5px;
    background: rgba(0,255,100,0.05);
}

/* 按鈕 */
button {
    background: black;
    border: 1px solid #00ff88;
    color: #00ff88;
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}

button:hover {
    background: #00ff88;
    color: black;
}

/* 學生資訊 */
.info {
    margin-top: 10px;
    font-size: 14px;
}

/* 圖表高度 */
canvas {
    max-height: 200px;
}
</style>
</head>

<body>

<div class="container">

    <!-- 左邊 -->
    <div class="left">

        <!-- 上：歷史資料 -->
        <div class="card">
            <h3>歷史資料</h3>

            <button onclick="switchSensor('temp')">溫度</button>
            <button onclick="switchSensor('hum')">濕度</button>
            <button onclick="switchSensor('light')">光照</button>

            <canvas id="historyChart"></canvas>
        </div>

        <!-- 下：導航 -->
        <div class="card">
            <h3>系統導覽</h3>

            <button onclick="location.href='/'">組別主頁</button>
            <button onclick="location.href='/project'">專題頁面</button>

            <div class="info">
                學號B11213060 - 解皓翔
            </div>
        </div>

    </div>

    <!-- 右邊 -->
    <div class="right">

    <div class="card">
        <h4>距離 (distance)</h4>
        <div style="font-size: 30px;" id="distance">--</div>
    </div>

    <div class="card">
        <h4>麥克風 (mic)</h4>
        <div style="font-size: 30px;" id="mic">--</div>
    </div>

    <div class="card">
        <h4>光照 (light)</h4>
        <div style="font-size: 30px;" id="light">--</div>
    </div>

</div>

</div>

<script>

/* ===== 歷史圖 ===== */

const historyCtx = document.getElementById('historyChart');

let historyChart = new Chart(historyCtx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {
                label: "distance",
                data: [],
                borderColor: "#00ff88"
            },
            {
                label: "mic",
                data: [],
                borderColor: "#ffcc00"
            },
            {
                label: "light",
                data: [],
                borderColor: "#00aaff"
            }
        ]
    }
});

async function fetchHistory() {
    try {
        const res = await fetch("/history");
        const data = await res.json();

        // 反轉（因為你 SQL DESC）
        const reversed = data.reverse();

        historyChart.data.labels = reversed.map(d => d.ts);

        historyChart.data.datasets[0].data = reversed.map(d => d.distance);
        historyChart.data.datasets[1].data = reversed.map(d => d.mic);
        historyChart.data.datasets[2].data = reversed.map(d => d.light);

        historyChart.update();

    } catch (err) {
        console.log("history API error:", err);
    }
}

// 5 秒更新
setInterval(fetchHistory, 5000);
fetchHistory();

async function fetchSensor() {
    try {
        const res = await fetch("/sensor");
        const data = await res.json();

        document.getElementById("distance").innerText = data.distance ?? "N/A";
        document.getElementById("mic").innerText = data.mic ?? "N/A";
        document.getElementById("light").innerText = data.light ?? "N/A";

    } catch (err) {
        console.log("API error:", err);
    }
}

setInterval(fetchSensor, 1000);
fetchSensor();

</script>

</body>
</html>

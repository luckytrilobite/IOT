<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>國際新聞 + 斗六天氣</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    background: #1e293b;
    text-align: center;
    font-size: 20px;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
}

h2 {
    border-left: 4px solid #38bdf8;
    padding-left: 8px;
}

.news-item {
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #333;
}

.weather-hour {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<header>
    🌍 國際新聞 + 🌦 斗六 8 小時天氣
</header>

<div class="container">

<!-- NEWS -->
<div class="card">
    <h2>國際最新新聞</h2>
    <div id="news">載入中...</div>
</div>

<!-- WEATHER -->
<div class="card">
    <h2>斗六 8 小時天氣</h2>
    <div id="weather">載入中...</div>
</div>

</div>

<script>
// ========================
// 1. 國際新聞（用 GDELT，不用 API key）
// ========================
async function loadNews() {
    const url = "https://api.gdeltproject.org/api/v2/doc/doc?query=world&mode=artlist&format=json&maxrecords=5";

    try {
        const res = await fetch(url);
        const data = await res.json();

        let html = "";
        data.articles.forEach(a => {
            html += `
                <div class="news-item">
                    <a href="${a.url}" target="_blank" style="color:#38bdf8">
                        ${a.title}
                    </a>
                    <div style="font-size:12px;color:#aaa">
                        ${a.sourceCountry || ""} ${a.seendate || ""}
                    </div>
                </div>
            `;
        });

        document.getElementById("news").innerHTML = html;
    } catch (e) {
        document.getElementById("news").innerHTML = "新聞載入失敗";
    }
}

// ========================
// 2. 斗六天氣（Open-Meteo）
// ========================
async function loadWeather() {
    // 斗六座標
    const lat = 23.707;
    const lon = 120.543;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability&timezone=Asia%2FTaipei`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        let html = "";
        for (let i = 0; i < 8; i++) {
            const time = data.hourly.time[i].slice(11,16);
            const temp = data.hourly.temperature_2m[i];
            const rain = data.hourly.precipitation_probability[i];

            html += `
                <div class="weather-hour">
                    <span>${time}</span>
                    <span>${temp}°C</span>
                    <span>降雨 ${rain}%</span>
                </div>
            `;
        }

        document.getElementById("weather").innerHTML = html;

    } catch (e) {
        document.getElementById("weather").innerHTML = "天氣載入失敗";
    }
}

// 啟動
loadNews();
loadWeather();

// 每 10 分鐘更新
setInterval(() => {
    loadNews();
    loadWeather();
}, 600000);

</script>

</body>
</html>

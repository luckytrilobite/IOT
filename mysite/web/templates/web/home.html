<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IoT Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    padding: 14px;
    background: #1e293b;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    padding: 10px;
    height: calc(100vh - 60px);
}

/* NEWS */
.news {
    grid-row: 1 / span 2;
    background: #111827;
    border-radius: 12px;
    padding: 12px;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

.news-card {
    background: #0b1220;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #1f2937;
}

.news-card a {
    color: #38bdf8;
    text-decoration: none;
    font-size: 14px;
    display: block;
    margin-bottom: 6px;
}

.news-meta {
    font-size: 11px;
    color: #9ca3af;
}

/* WEATHER */
.weather {
    background: #111827;
    border-radius: 12px;
    padding: 10px;
    height: 180px;
    overflow: hidden;
}

.weather-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    border-bottom: 1px solid #1f2937;
}

.empty {
    background: #0b1220;
    border-radius: 12px;
    border: 1px dashed #1f2937;
}
</style>
</head>

<body>

<header>
IoT Dashboard
</header>

<div class="container">

<div class="news" id="news">載入新聞中...</div>

<div class="weather">
    <h3 style="margin:0 0 6px 0;">🌦 斗六天氣</h3>
    <div id="weather">載入中...</div>
</div>

<div class="empty"></div>

</div>

<script>

// =====================
// NEWS (SAFE VERSION)
// =====================
async function loadNews() {
    try {
        const res = await fetch("/news/");

        if (!res.ok) {
            throw new Error("HTTP " + res.status);
        }

        const text = await res.text();

        const xml = new DOMParser().parseFromString(text, "text/xml");

        const items = xml.querySelectorAll("item");

        if (!items.length) {
            document.getElementById("news").innerHTML =
                "❌ RSS 空資料";
            return;
        }

        let html = "";

        items.forEach((item, i) => {
            if (i >= 12) return;

            const title = item.querySelector("title")?.textContent || "no title";
            const link = item.querySelector("link")?.textContent || "#";
            const date = item.querySelector("pubDate")?.textContent || "";

            html += `
                <div class="news-card">
                    <a href="${link}" target="_blank">${title}</a>
                    <div class="news-meta">
                        ${date ? new Date(date).toLocaleString() : ""}
                    </div>
                </div>
            `;
        });

        document.getElementById("news").innerHTML = html;

    } catch (e) {
        document.getElementById("news").innerHTML =
            "❌ News load failed: " + e.message;
        console.error(e);
    }
}

// =====================
// WEATHER (SAFE)
// =====================
async function loadWeather() {
    try {
        const lat = 23.707;
        const lon = 120.543;

        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability&current_weather=true&timezone=Asia/Taipei`;

        const res = await fetch(url);
        const data = await res.json();

        let html = "";

        // NOW
        html += `
            <div style="margin-bottom:8px;border-bottom:1px solid #1f2937;">
                🌡 現在：${data.current_weather.temperature}°C
                | 🌬 ${data.current_weather.windspeed} km/h
            </div>
        `;

        // NEXT 5 HOURS
        for (let i = 0; i < 5; i++) {

            const t = new Date(data.hourly.time[i]).toLocaleString("zh-TW", {
                year:"numeric",
                month:"2-digit",
                day:"2-digit",
                hour:"2-digit",
                minute:"2-digit"
            });

            html += `
                <div class="weather-row">
                    <div>${t}</div>
                    <div>${data.hourly.temperature_2m[i]}°C</div>
                    <div>🌧 ${data.hourly.precipitation_probability[i]}%</div>
                </div>
            `;
        }

        document.getElementById("weather").innerHTML = html;

    } catch (e) {
        document.getElementById("weather").innerHTML =
            "❌ Weather failed";
    }
}

// init
loadNews();
loadWeather();

setInterval(() => {
    loadNews();
    loadWeather();
}, 600000);

</script>

</body>
</html>

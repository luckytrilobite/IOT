<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>IoT Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    color: #00ff88;
    font-family: "Courier New", monospace;
}

.container {
    display: flex;
    height: 100vh;
}

/* 左邊 2/3 */
.left {
    width: 66%;
    padding: 20px;
    box-sizing: border-box;
    border-right: 1px solid #00ff88;
}

/* 右邊 1/3 */
.right {
    width: 34%;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* 卡片 */
.card {
    border: 1px solid #00ff88;
    padding: 15px;
    border-radius: 5px;
    background: rgba(0,255,100,0.05);
}

/* 按鈕 */
button {
    background: black;
    border: 1px solid #00ff88;
    color: #00ff88;
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}

button:hover {
    background: #00ff88;
    color: black;
}

/* 學生資訊 */
.info {
    margin-top: 10px;
    font-size: 14px;
}

/* 圖表高度 */
canvas {
    max-height: 200px;
}
</style>
</head>

<body>

<div class="container">

    <!-- 左邊 -->
    <div class="left">

        <!-- 上：歷史資料 -->
        <div class="card">
            <h3>歷史資料</h3>

            <button onclick="switchSensor('temp')">溫度</button>
            <button onclick="switchSensor('hum')">濕度</button>
            <button onclick="switchSensor('light')">光照</button>

            <canvas id="historyChart"></canvas>
        </div>

        <!-- 下：導航 -->
        <div class="card">
            <h3>系統導覽</h3>

            <button onclick="location.href='/'">組別主頁</button>
            <button onclick="location.href='/project'">專題頁面</button>

            <div class="info">
                學號A12345678 - 王小明<br>
                學號A12345679 - 李小華<br>
                學號A12345680 - 張小強
            </div>
        </div>

    </div>

    <!-- 右邊 -->
    <div class="right">

        <div class="card">
            <h4>即時溫度</h4>
            <canvas id="chart1"></canvas>
        </div>

        <div class="card">
            <h4>即時濕度</h4>
            <canvas id="chart2"></canvas>
        </div>

        <div class="card">
            <h4>即時光照</h4>
            <canvas id="chart3"></canvas>
        </div>

    </div>

</div>

<script>

/* ===== 歷史圖 ===== */
const historyCtx = document.getElementById('historyChart');

let historyChart = new Chart(historyCtx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'sensor',
            data: [],
            borderColor: '#00ff88'
        }]
    }
});

function switchSensor(type) {
    // 假資料（之後可改 API）
    let dataMap = {
        temp: [20,22,23,25,24,26],
        hum: [60,65,63,70,68,72],
        light: [300,320,310,330,350,340]
    };

    historyChart.data.labels = ['1','2','3','4','5','6'];
    historyChart.data.datasets[0].data = dataMap[type];
    historyChart.data.datasets[0].label = type;
    historyChart.update();
}

/* ===== 即時圖（模擬） ===== */
function createRealtimeChart(id) {
    return new Chart(document.getElementById(id), {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                data: [],
                borderColor: '#00ff88'
            }]
        },
        options: {
            animation: false
        }
    });
}

let c1 = createRealtimeChart('chart1');
let c2 = createRealtimeChart('chart2');
let c3 = createRealtimeChart('chart3');

function updateChart(chart, value) {
    let time = new Date().toLocaleTimeString();

    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(value);

    if(chart.data.labels.length > 10) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();
}

/* 模擬即時資料 */
setInterval(() => {
    updateChart(c1, Math.random()*30);
    updateChart(c2, Math.random()*100);
    updateChart(c3, Math.random()*500);
}, 1000);

</script>

</body>
</html>

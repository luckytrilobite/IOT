<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IoT Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* header */
header {
    padding: 14px;
    background: #1e293b;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}

/* layout */
.container {
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    padding: 10px;
    height: calc(100vh - 60px);
}

/* NEWS (左側大區) */
.news {
    grid-row: 1 / span 2;
    background: #111827;
    border-radius: 12px;
    padding: 12px;
    overflow-y: auto;

    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

/* NEWS card */
.news-card {
    background: #0b1220;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #1f2937;
}

.news-card a {
    color: #38bdf8;
    text-decoration: none;
    font-size: 14px;
    display: block;
    margin-bottom: 6px;
}

.news-card a:hover {
    text-decoration: underline;
}

.news-meta {
    font-size: 11px;
    color: #9ca3af;
}

/* WEATHER (右上) */
.weather {
    background: #111827;
    border-radius: 12px;
    padding: 10px;
    height: 180px;
    overflow: hidden;
}

.weather-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    border-bottom: 1px solid #1f2937;
}

/* EMPTY (右下) */
.empty {
    background: #0b1220;
    border-radius: 12px;
    border: 1px dashed #1f2937;
}
</style>
</head>

<body>

<header>
    News / Weather
</header>

<div class="container">

<!-- NEWS -->
<div class="news" id="news">
    載入新聞中...
</div>

<!-- WEATHER -->
<div class="weather">
    <h3 style="margin:0 0 6px 0;">🌦 斗六天氣</h3>
    <div id="weather">載入中...</div>
</div>

<!-- EMPTY -->
<div class="empty"></div>

</div>

<script>

// =====================
// NEWS (卡片式)
// =====================
async function loadNews() {
    const res = await fetch("/news/");
    const text = await res.text();

    const xml = new DOMParser().parseFromString(text, "text/xml");
    const items = xml.querySelectorAll("item");

    let html = "";

    items.forEach((item, i) => {
        if (i >= 12) return;

        const title = item.querySelector("title")?.textContent;
        const link = item.querySelector("link")?.textContent;
        const date = item.querySelector("pubDate")?.textContent;

        html += `
            <div class="news-card">
                <a href="${link}" target="_blank">${title}</a>
                <div class="news-meta">
                    ${new Date(date).toLocaleString()}
                </div>
            </div>
        `;
    });

    document.getElementById("news").innerHTML = html;
}

// =====================
// WEATHER (縮小版)
// =====================
async function loadWeather() {
    const lat = 23.707;
    const lon = 120.543;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability&timezone=Asia/Taipei`;

    const res = await fetch(url);
    const data = await res.json();

    let html = "";

    for (let i = 0; i < 6; i++) {
        const time = data.hourly.time[i].slice(11, 16);
        const temp = data.hourly.temperature_2m[i];
        const rain = data.hourly.precipitation_probability[i];

        html += `
            <div class="weather-row">
                <div>${time}</div>
                <div>${temp}°C</div>
                <div>🌧 ${rain}%</div>
            </div>
        `;
    }

    document.getElementById("weather").innerHTML = html;
}

// init
loadNews();
loadWeather();

setInterval(() => {
    loadNews();
    loadWeather();
}, 600000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>IoT Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    color: #00ff88;
    font-family: "Courier New", monospace;
}

.container {
    display: flex;
    height: 100vh;
}

/* 左 2/3 */
.left {
    width: 66%;
    padding: 20px;
    box-sizing: border-box;
    border-right: 1px solid #00ff88;
}

/* 右 1/3 */
.right {
    width: 34%;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* 卡片 */
.card {
    border: 1px solid #00ff88;
    padding: 15px;
    border-radius: 5px;
    background: rgba(0,255,100,0.05);
}

/* 按鈕 */
button {
    background: black;
    border: 1px solid #00ff88;
    color: #00ff88;
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}

button:hover {
    background: #00ff88;
    color: black;
}

/* info */
.info {
    margin-top: 10px;
    font-size: 14px;
}

/* chart container */
.chart-box {
    height: 300px;
}

</style>
</head>

<body>

<div class="container">

    <!-- 左邊 -->
    <div class="left">

        <!-- 歷史資料 -->
        <div class="card">
            <h3>歷史資料</h3>

            <button onclick="switchSensor('distance')">距離</button>
            <button onclick="switchSensor('mic')">麥克風</button>
            <button onclick="switchSensor('light')">光照</button>

            <div class="chart-box">
                <canvas id="historyChart"></canvas>
            </div>
        </div>

        <!-- 導航 -->
        <div class="card">
            <h3>系統導覽</h3>

            <button onclick="location.href='/'">組別主頁</button>
            <button onclick="location.href='/project'">專題頁面</button>

            <div class="info">
                學號 B11213060 - 解皓翔
            </div>
        </div>

    </div>

    <!-- 右邊 -->
    <div class="right">

        <div class="card">
            <h4>距離 (distance)</h4>
            <div style="font-size: 30px;" id="distance">--</div>
        </div>

        <div class="card">
            <h4>麥克風 (mic)</h4>
            <div style="font-size: 30px;" id="mic">--</div>
        </div>

        <div class="card">
            <h4>光照 (light)</h4>
            <div style="font-size: 30px;" id="light">--</div>
        </div>

    </div>

</div>

<script>

let currentHistoryType = "all";

/* =========================
   History Chart
========================= */
const historyCtx = document.getElementById('historyChart');

let historyChart = new Chart(historyCtx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {
                label: "distance",
                data: [],
                borderColor: "#00ff88",
                tension: 0.3
            },
            {
                label: "mic",
                data: [],
                borderColor: "#ffcc00",
                tension: 0.3
            },
            {
                label: "light",
                data: [],
                borderColor: "#00aaff",
                tension: 0.3
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        scales: {
            x: {
                ticks: {
                    maxTicksLimit: 5
                }
            }
        }
    }
});

/* =========================
   History API
========================= */
async function fetchHistory() {
    try {
        const res = await fetch("/history");
        const data = await res.json();

        const reversed = data.reverse();

        const labels = reversed.map(d => d.ts.split(" ")[1]);

        if (currentHistoryType === "all") {

            historyChart.data.labels = labels;

            historyChart.data.datasets[0].data = reversed.map(d => d.distance);
            historyChart.data.datasets[1].data = reversed.map(d => d.mic);
            historyChart.data.datasets[2].data = reversed.map(d => d.light);

        } else {

            historyChart.data.labels = labels;

            historyChart.data.datasets[0].data = [];
            historyChart.data.datasets[1].data = [];
            historyChart.data.datasets[2].data = [];

            if (currentHistoryType === "distance") {
                historyChart.data.datasets[0].data = reversed.map(d => d.distance);
            }

            if (currentHistoryType === "mic") {
                historyChart.data.datasets[1].data = reversed.map(d => d.mic);
            }

            if (currentHistoryType === "light") {
                historyChart.data.datasets[2].data = reversed.map(d => d.light);
            }
        }

        historyChart.update();

    } catch (err) {
        console.log("history API error:", err);
    }
}

/* 切換歷史圖 */
function switchSensor(type) {
    currentHistoryType = type;
}

/* =========================
   Sensor API
========================= */
async function fetchSensor() {
    try {
        const res = await fetch("/sensor");
        const data = await res.json();

        document.getElementById("distance").innerText = data.distance ?? "N/A";
        document.getElementById("mic").innerText = data.mic ?? "N/A";
        document.getElementById("light").innerText = data.light ?? "N/A";

    } catch (err) {
        console.log("sensor API error:", err);
    }
}

/* =========================
   Intervals
========================= */
setInterval(fetchSensor, 1000);
setInterval(fetchHistory, 5000);

fetchSensor();
fetchHistory();

</script>

</body>
</html>
